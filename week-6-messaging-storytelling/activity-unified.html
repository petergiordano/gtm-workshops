<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging & Storytelling Workshop</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
        }
        .laptop-textarea {
            min-height: 80px;
            max-height: 120px;
            transition: max-height 0.3s ease;
            resize: none;
        }
        .laptop-textarea:focus {
            max-height: 200px;
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-icon {
            width: 48px;
            height: 48px;
            background-color: #FF9000;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .lucide-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .choice-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .choice-card.selected {
            border-color: #FF9000;
            background: #FFF7ED;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="application/json" id="testData">
    {
      "currentStep": 3,
      "step1": {
        "brandVoice": ["Authoritative", "Innovative", "Reliable"],
        "targetPersona": "DevOps Managers and SRE Leads at Series B+ SaaS companies",
        "umbrellaMessage": "Predictive infrastructure monitoring that stops outages before they impact your customers.",
        "pillar1Title": "Predictive Intelligence",
        "pillar1Desc": "AI-driven anomaly detection that identifies system stress 15-30 minutes before failure.",
        "pillar1Proof": "Reduced P0 incidents by 64% for 50+ enterprise cloud customers.",
        "pillar2Title": "Zero-Config Observability",
        "pillar2Desc": "Auto-discovery of microservices and dependencies without manual instrumentation.",
        "pillar2Proof": "Deployment takes less than 10 minutes compared to weeks for legacy tools.",
        "pillar3Title": "Operational Efficiency",
        "pillar3Desc": "Automated root cause analysis that points engineers directly to the failing code.",
        "pillar3Proof": "Average Mean Time to Resolution (MTTR) dropped from 4 hours to 18 minutes."
      },
      "step2": {
        "statusQuo": "Teams rely on reactive threshold-based alerts that only fire after a service has already failed.",
        "theChange": "Modern cloud-native architectures have become too complex for manual monitoring and static thresholds.",
        "theComplication": "Alert fatigue is burning out engineers, while critical signals are missed in the noise, leading to expensive downtime.",
        "newWorld": "A proactive 'Self-Healing' infrastructure where failures are predicted and mitigated before users ever notice a lag.",
        "theSolution": "Posh AI provides the predictive layer that translates raw system data into actionable business continuity."
      },
      "step3": {
        "selectedAssets": ["pitch_deck", "one_pager", "website_copy"],
        "assetDetails": "The pitch deck will center on the 'Cost of Silence' narrative. The one-pager will include our 5-minute ROI calculator for SRE teams.",
        "primaryCTA": "Request a 15-minute technical infrastructure audit.",
        "distributionPlan": "Direct outreach to SRE communities, LinkedIn thought leadership series on 'The Death of the Dashboard', and targeted sponsorships of DevOps Weekly."
      }
    }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CheckCircle = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22,4 12,14.01 9,11.01"/>
            </svg>
        );
        const WordCountFeedback = ({ text = '', minWords = 5 }) => {
            const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            const isValid = wordCount >= minWords;
            return (
                <div className="flex justify-between items-center mt-1">
                    <span className="text-xs text-gray-500">(write {minWords}+ words)</span>
                    <span className={`text-sm flex items-center gap-1 ${isValid ? 'text-green-600' : 'text-gray-500'}`}>
                        {wordCount} words {isValid && <CheckCircle size={14} />}
                    </span>
                </div>
            );
        };


        + words)</span>
                    <span className={`text-sm flex items-center gap-1 ${isValid ? 'text-green-600' : 'text-gray-500'}`}>
                        {wordCount} words {isValid && <CheckCircle size={14} />}
                    </span>
                </div>
            );
        };

        const WORKSHOP_STORAGE_KEY = 'workshopState_messaging_storytelling';

        // --- Icons ---


        const MessageSquare = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        );

        const BookOpen = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        );

        const PenTool = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/><path d="M9.5 14.5L16 18"/>
            </svg>
        );

        const Info = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
        );

        const FileText = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/>
            </svg>
        );

        // --- Helper Components ---
        + words)</span>
                    <span className={`text-sm flex items-center gap-1 ${isValid ? 'text-green-600' : 'text-gray-500'}`}>
                        {wordCount} words {isValid && <CheckCircle size={14} />}
                    </span>
                </div>
            );
        };

        const StepIndicator = ({ currentStep, steps, onStepClick }) => (
            <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                <div className="flex justify-between items-center">
                    {steps.map((step, index) => (
                        <React.Fragment key={step.number}>
                            <div
                                className={`flex items-center ${onStepClick ? 'cursor-pointer' : ''}`}
                                onClick={() => onStepClick && onStepClick(step.number)}
                            >
                                <div className={`step-icon ${
                                    currentStep === step.number ? 'bg-orange-500' :
                                    currentStep > step.number ? 'bg-green-500' : 'bg-gray-400'
                                }`}>
                                    {currentStep > step.number ? <CheckCircle size={24} /> : step.number}
                                </div>
                                <div className="ml-3 hidden md:block text-left">
                                    <p className="text-sm font-medium text-gray-900">{step.title}</p>
                                    <p className="text-xs text-gray-500">{step.desc}</p>
                                </div>
                            </div>
                            {index < steps.length - 1 && (
                                <div className="flex-1 mx-4 h-px bg-gray-300"></div>
                            )}
                        </React.Fragment>
                    ))}
                </div>
            </div>
        );

        // --- Main Component ---
        const WorkshopApp = () => {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem(WORKSHOP_STORAGE_KEY);
                const initialState = saved ? JSON.parse(saved) : {
                    currentStep: 1,
                    step1: {
                        brandVoice: [],
                        targetPersona: '',
                        umbrellaMessage: '',
                        pillar1Title: '', pillar1Desc: '', pillar1Proof: '',
                        pillar2Title: '', pillar2Desc: '', pillar2Proof: '',
                        pillar3Title: '', pillar3Desc: '', pillar3Proof: ''
                    },
                    step2: {
                        statusQuo: '',
                        theChange: '',
                        theComplication: '',
                        newWorld: '',
                        theSolution: ''
                    },
                    step3: {
                        selectedAssets: [],
                        assetDetails: '',
                        primaryCTA: '',
                        distributionPlan: ''
                    }
                };

                const params = new URLSearchParams(window.location.search);
                const stepParam = params.get('step');
                if (stepParam) {
                    initialState.currentStep = parseInt(stepParam, 10);
                }

                return initialState;
            });

            useEffect(() => {
                localStorage.setItem(WORKSHOP_STORAGE_KEY, JSON.stringify(state));
            }, [state]);

            const [devMode, setDevMode] = useState(false);
            const toggleDevMode = () => setDevMode(!devMode);

            const devFillData = () => {
                try {
                    const testData = JSON.parse(document.getElementById('testData').textContent);
                    setState(testData);
                } catch (e) {
                    console.error("Failed to load test data", e);
                }
            };

            const updateState = (updates) => setState(prev => ({ ...prev, ...updates }));

            const updateStepState = (step, updates) => {
                setState(prev => ({
                    ...prev,
                    [step]: { ...prev[step], ...updates }
                }));
            };

            const [showGuidance, setShowGuidance] = useState(false);

            const brandVoiceOptions = [
                "Authoritative", "Innovative", "Reliable", "Empathetic", "Direct", "Friendly", "Visionary", "Analytical"
            ];

            const assetOptions = [
                { id: 'pitch_deck', name: 'Pitch Deck', icon: '📽️' },
                { id: 'one_pager', name: 'One Pager', icon: '📄' },
                { id: 'website_copy', name: 'Website Copy', icon: '🌐' },
                { id: 'case_study', name: 'Case Study', icon: '📝' },
                { id: 'sales_email', name: 'Sales Email Sequence', icon: '✉️' },
                { id: 'social_content', name: 'Social Content Strategy', icon: '📱' }
            ];

            // Validation
            const getWordCount = (text) => text.trim().split(/\s+/).filter(w => w.length > 0).length;

            const isStep1Complete = () => {
                const s1 = state.step1;
                return s1.brandVoice.length >= 2 &&
                       getWordCount(s1.targetPersona) >= 5 &&
                       getWordCount(s1.umbrellaMessage) >= 8 &&
                       getWordCount(s1.pillar1Title) >= 2 && getWordCount(s1.pillar1Desc) >= 5 &&
                       getWordCount(s1.pillar2Title) >= 2 && getWordCount(s1.pillar2Desc) >= 5 &&
                       getWordCount(s1.pillar3Title) >= 2 && getWordCount(s1.pillar3Desc) >= 5;
            };

            const isStep2Complete = () => {
                const s2 = state.step2;
                return getWordCount(s2.statusQuo) >= 10 &&
                       getWordCount(s2.theChange) >= 10 &&
                       getWordCount(s2.theComplication) >= 10 &&
                       getWordCount(s2.newWorld) >= 10 &&
                       getWordCount(s2.theSolution) >= 10;
            };

            const isStep3Complete = () => {
                const s3 = state.step3;
                return s3.selectedAssets.length >= 2 &&
                       getWordCount(s3.assetDetails) >= 15 &&
                       getWordCount(s3.primaryCTA) >= 5 &&
                       getWordCount(s3.distributionPlan) >= 15;
            };

            const steps = [
                { number: 1, title: "Message Strategy", desc: "Framework & Voice", complete: isStep1Complete() },
                { number: 2, title: "Storytelling", desc: "Narrative Arc", complete: isStep2Complete() },
                { number: 3, title: "Content Creation", desc: "Assets & CTA", complete: isStep3Complete() }
            ];

            const renderStep1 = () => (
                <div className="animate-fadeIn space-y-8">
                    <div>
                        <h2 className="text-xl font-bold text-gray-800">Step 1: Craft Your Message Strategy</h2>
                        <p className="text-gray-600">Establish your brand voice and the core messaging pillars that support your value proposition.</p>
                    </div>

                    <div className="space-y-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                            <span className="bg-orange-100 text-orange-600 p-1 rounded-full"><CheckCircle size={14} /></span>
                            Select Your Brand Voice (Choose at least 2)
                        </label>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                            {brandVoiceOptions.map(voice => (
                                <div 
                                    key={voice}
                                    onClick={() => {
                                        const current = state.step1.brandVoice;
                                        const updated = current.includes(voice) ? current.filter(v => v !== voice) : [...current, voice];
                                        updateStepState('step1', { brandVoice: updated });
                                    }}
                                    className={`p-3 border rounded-lg text-center cursor-pointer transition-all text-sm font-medium ${state.step1.brandVoice.includes(voice) ? 'border-orange-500 bg-orange-50 text-orange-700 shadow-sm' : 'border-gray-200 bg-white hover:border-orange-200'}`}
                                >
                                    {voice}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-4 pt-4 border-t border-gray-100">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">Target Persona</label>
                            <input
                                className="w-full p-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                value={state.step1.targetPersona}
                                onChange={(e) => updateStepState('step1', { targetPersona: e.target.value })}
                                placeholder="E.g. Technical Founders of Cloud Infrastructure startups..."
                            />
                            <WordCountFeedback text={state.step1.targetPersona} minWords={5} />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1">Umbrella Message (One Sentence)</label>
                            <textarea
                                className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                value={state.step1.umbrellaMessage}
                                onChange={(e) => updateStepState('step1', { umbrellaMessage: e.target.value })}
                                placeholder="E.g. We help cloud startups scale without the complexity of managing their own K8s clusters."
                            />
                            <WordCountFeedback text={state.step1.umbrellaMessage} minWords={8} />
                        </div>
                    </div>

                    <div className="space-y-6 pt-4 border-t border-gray-100">
                        <h3 className="font-bold text-gray-800 flex items-center gap-2"><MessageSquare /> Messaging Pillars</h3>
                        <div className="grid md:grid-cols-3 gap-6">
                            {[1, 2, 3].map(i => (
                                <div key={i} className="space-y-3 p-4 bg-gray-50 rounded-xl border border-gray-200">
                                    <h4 className="font-bold text-sm text-orange-600 uppercase tracking-wider">Pillar {i}</h4>
                                    <input
                                        className="w-full p-2 border border-gray-300 rounded text-sm font-bold focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step1[`pillar${i}Title`]}
                                        onChange={(e) => updateStepState('step1', { [`pillar${i}Title`]: e.target.value })}
                                        placeholder="Pillar Title"
                                    />
                                    <textarea
                                        className="laptop-textarea w-full h-24 p-2 border border-gray-300 rounded text-xs p-3 resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step1[`pillar${i}Desc`]}
                                        onChange={(e) => updateStepState('step1', { [`pillar${i}Desc`]: e.target.value })}
                                        placeholder="Detailed description of this value pillar..."
                                    />
                                    <textarea
                                        className="laptop-textarea w-full h-16 p-2 border border-orange-100 bg-orange-50 rounded text-xs italic p-3 resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step1[`pillar${i}Proof`]}
                                        onChange={(e) => updateStepState('step1', { [`pillar${i}Proof`]: e.target.value })}
                                        placeholder="Proof points, stats, or evidence..."
                                    />
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderStep2 = () => (
                <div className="animate-fadeIn space-y-8">
                    <div>
                        <h2 className="text-xl font-bold text-gray-800">Step 2: Define Your Storytelling Framework</h2>
                        <p className="text-gray-600">Structure your narrative using a classic change-driven framework to build tension and resolution.</p>
                    </div>

                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 cursor-pointer mb-6" onClick={() => setShowGuidance(!showGuidance)}>
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Info className="text-blue-600" />
                                <span className="font-semibold text-blue-800 text-sm">Framework: The Strategic Narrative Arc</span>
                            </div>
                            <span className={`transform transition-transform ${showGuidance ? 'rotate-180' : ''}`}>▼</span>
                        </div>
                        {showGuidance && (
                            <div className="mt-4 text-xs text-blue-700 space-y-2 animate-fadeIn">
                                <p><strong>Status Quo:</strong> The world as it was, which worked until recently.</p>
                                <p><strong>The Change:</strong> A shift in the environment (tech, regulatory, social) that makes the status quo untenable.</p>
                                <p><strong>Complication:</strong> The pain and friction caused by trying to use old solutions in the new world.</p>
                                <p><strong>New World:</strong> A vision of what life looks like after solving the complication.</p>
                                <p><strong>The Solution:</strong> How you enable that new world.</p>
                            </div>
                        )}
                    </div>

                    <div className="space-y-6">
                        <div className="grid md:grid-cols-2 gap-6">
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">1. Status Quo (Past Reality)</label>
                                    <textarea
                                        className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step2.statusQuo}
                                        onChange={(e) => updateStepState('step2', { statusQuo: e.target.value })}
                                        placeholder="How did customers solve this before? Why was it okay then?"
                                    />
                                    <WordCountFeedback text={state.step2.statusQuo} minWords={10} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">2. The Big Change (Market Shift)</label>
                                    <textarea
                                        className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step2.theChange}
                                        onChange={(e) => updateStepState('step2', { theChange: e.target.value })}
                                        placeholder="What changed in the market or technology that created a gap?"
                                    />
                                    <WordCountFeedback text={state.step2.theChange} minWords={10} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">3. The Complication (Pain/Friction)</label>
                                    <textarea
                                        className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step2.theComplication}
                                        onChange={(e) => updateStepState('step2', { theComplication: e.target.value })}
                                        placeholder="What happens to customers who don't adapt to the change?"
                                    />
                                    <WordCountFeedback text={state.step2.theComplication} minWords={10} />
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div className="p-6 bg-orange-50 border border-orange-200 rounded-2xl h-full flex flex-col space-y-4">
                                    <h3 className="font-bold text-orange-800 flex items-center gap-2"><BookOpen /> The Resolution</h3>
                                    <div className="flex-1">
                                        <label className="block text-sm font-bold text-orange-700 mb-1">4. The New World (The Goal)</label>
                                        <textarea
                                            className="laptop-textarea w-full p-3 border rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                            value={state.step2.newWorld}
                                            onChange={(e) => updateStepState('step2', { newWorld: e.target.value })}
                                            placeholder="What is the ideal future state for your customer?"
                                        />
                                        <WordCountFeedback text={state.step2.newWorld} minWords={10} />
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-sm font-bold text-orange-700 mb-1">5. The Solution (Your Role)</label>
                                        <textarea
                                            className="laptop-textarea w-full p-3 border rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                            value={state.step2.theSolution}
                                            onChange={(e) => updateStepState('step2', { theSolution: e.target.value })}
                                            placeholder="How exactly does your product bridge the gap to the new world?"
                                        />
                                        <WordCountFeedback text={state.step2.theSolution} minWords={10} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderStep3 = () => (
                <div className="animate-fadeIn space-y-8">
                    <div>
                        <h2 className="text-xl font-bold text-gray-800">Step 3: Content Creation & Distribution</h2>
                        <p className="text-gray-600">Select your key assets and define how you will deliver your message to the market.</p>
                    </div>

                    <div className="space-y-6">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-3">Primary Content Assets (Select at least 2)</label>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {assetOptions.map(asset => (
                                    <div 
                                        key={asset.id}
                                        onClick={() => {
                                            const current = state.step3.selectedAssets;
                                            const updated = current.includes(asset.id) ? current.filter(id => id !== asset.id) : [...current, asset.id];
                                            updateStepState('step3', { selectedAssets: updated });
                                        }}
                                        className={`choice-card flex items-center gap-3 ${state.step3.selectedAssets.includes(asset.id) ? 'selected' : ''}`}
                                    >
                                        <span className="text-xl">{asset.icon}</span>
                                        <span className="text-sm font-bold">{asset.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {state.step3.selectedAssets.length > 0 && (
                            <div className="space-y-6 pt-4 border-t border-gray-100 animate-fadeIn">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">Asset Implementation Details</label>
                                    <textarea
                                        className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                        value={state.step3.assetDetails}
                                        onChange={(e) => updateStepState('step3', { assetDetails: e.target.value })}
                                        placeholder="Describe what will go into these assets (E.g. The Pitch Deck will focus on X and Y...)"
                                    />
                                    <WordCountFeedback text={state.step3.assetDetails} minWords={15} />
                                </div>

                                <div className="grid md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center gap-2">
                                            <PenTool size={16} className="text-orange-500" />
                                            Primary Call to Action (CTA)
                                        </label>
                                        <input
                                            className="w-full p-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                            value={state.step3.primaryCTA}
                                            onChange={(e) => updateStepState('step3', { primaryCTA: e.target.value })}
                                            placeholder="E.g. Book a Technical Audit"
                                        />
                                        <WordCountFeedback text={state.step3.primaryCTA} minWords={5} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Distribution Plan</label>
                                        <textarea
                                            className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                            value={state.step3.distributionPlan}
                                            onChange={(e) => updateStepState('step3', { distributionPlan: e.target.value })}
                                            placeholder="Where and how will you reach your target persona?"
                                        />
                                        <WordCountFeedback text={state.step3.distributionPlan} minWords={15} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {isStep3Complete() && (
                        <div className="p-8 bg-green-50 border-2 border-green-200 rounded-2xl animate-fadeIn">
                            <h3 className="text-2xl font-bold text-green-800 mb-4 flex items-center gap-3">
                                <CheckCircle size={32} />
                                Narrative Strategy Complete
                            </h3>
                            <p className="text-green-700 mb-6">You have completed the Messaging & Storytelling workshop. Your strategy is now documented and ready for execution.</p>

                            <div className="bg-white p-6 rounded-xl shadow-inner mb-6">
                                <h4 className="font-bold text-gray-700 mb-2 flex items-center gap-2"><FileText /> Markdown Export</h4>
                                <textarea
                                    readOnly
                                    className="w-full h-48 p-4 font-mono text-[10px] border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                    value={generateMarkdown()}
                                />
                            </div>

                            <div className="flex justify-center">
                                <button
                                    onClick={() => {
                                        navigator.clipboard.writeText(generateMarkdown());
                                        alert('Strategy exported to clipboard!');
                                    }}
                                    className="bg-green-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition-all shadow-lg flex items-center gap-2"
                                >
                                    <FileText size={24}/> Copy Strategy Summary
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            const generateMarkdown = () => {
                const { step1, step2, step3 } = state;
                
                return `# Messaging & Storytelling Strategy

## 1. Message Strategy
- **Brand Voice:** ${step1.brandVoice.join(', ')}
- **Target Persona:** ${step1.targetPersona}
- **Umbrella Message:** ${step1.umbrellaMessage}

### Messaging Pillars
- **Pillar 1:** ${step1.pillar1Title}
  - Description: ${step1.pillar1Desc}
  - Proof: ${step1.pillar1Proof}
- **Pillar 2:** ${step1.pillar2Title}
  - Description: ${step1.pillar2Desc}
  - Proof: ${step1.pillar2Proof}
- **Pillar 3:** ${step1.pillar3Title}
  - Description: ${step1.pillar3Desc}
  - Proof: ${step1.pillar3Proof}

## 2. Strategic Narrative
- **Status Quo:** ${step2.statusQuo}
- **The Change:** ${step2.theChange}
- **The Complication:** ${step2.theComplication}
- **The New World:** ${step2.newWorld}
- **The Solution:** ${step2.theSolution}

## 3. Implementation Plan
- **Selected Assets:** ${step3.selectedAssets.map(id => assetOptions.find(o => o.id === id)?.name).join(', ')}
- **Asset Details:** ${step3.assetDetails}
- **Primary CTA:** ${step3.primaryCTA}
- **Distribution Plan:** ${step3.distributionPlan}

---
Generated: ${new Date().toLocaleDateString()}`;
            };

            return (
                <div className="max-w-[900px] mx-auto p-4 md:p-8 text-gray-800">
                    <div className="flex justify-between items-center mb-4">
                        <a href="index.html" className="text-orange-500 hover:text-orange-600 font-bold text-sm">Back to Workshop</a>
                        <a href="../index.html" className="text-orange-500 hover:text-orange-600 font-bold text-sm">All Workshops</a>
                    </div>

                    <h1
                        className={`text-3xl font-bold mb-2 cursor-pointer select-none transition-colors ${devMode ? 'text-orange-600' : 'text-gray-800'}`}
                        onDoubleClick={toggleDevMode}
                    >
                        Messaging & Storytelling {devMode && '[dev]'}
                    </h1>

                    {devMode && (
                        <div className="mb-4 p-3 bg-orange-50 border border-orange-200 rounded-lg flex items-center justify-between animate-fadeIn">
                            <span className="text-xs text-orange-600 font-medium">Dev Mode Active</span>
                            <button onClick={devFillData} className="bg-orange-500 text-white px-3 py-1 rounded text-xs hover:bg-orange-600">Fill Test Data</button>
                        </div>
                    )}

                    <StepIndicator currentStep={state.currentStep} steps={steps} onStepClick={(n) => updateState({ currentStep: n })} />

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-10 mb-6 min-h-[500px]">
                        {state.currentStep === 1 && renderStep1()}
                        {state.currentStep === 2 && renderStep2()}
                        {state.currentStep === 3 && renderStep3()}
                    </div>

                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                        <button
                            onClick={() => updateState({ currentStep: Math.max(1, state.currentStep - 1) })}
                            disabled={state.currentStep === 1}
                            className={`px-6 py-2 rounded-lg font-bold transition-all ${state.currentStep === 1 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                        >
                            Back
                        </button>
                        <button
                            onClick={() => { if (confirm('Clear all work?')) { localStorage.removeItem(WORKSHOP_STORAGE_KEY); window.location.reload(); } }}
                            className="text-gray-400 text-xs hover:text-red-500 font-medium uppercase tracking-wider"
                        >
                            Reset Workshop
                        </button>
                        <button
                            onClick={() => { if (state.currentStep < 3) updateState({ currentStep: state.currentStep + 1 }); }}
                            className={`px-6 py-2 rounded-lg font-medium transition-all ${
                                state.currentStep === 3 ? (isStep3Complete() ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-green-600/50 text-white cursor-not-allowed') : 'bg-orange-500 text-white hover:bg-orange-600'
                            }`}
                        >
                            {state.currentStep === 3 ? 'Workshop Complete' : 'Continue'}
                        </button>
                    </div>

    <footer className="mt-12 py-8 border-t border-gray-100 text-center text-xs text-gray-400">Messaging & Storytelling Workshop — GTM Program — 2026</footer>
</div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WorkshopApp />);
    </script>
</body>
</html>
