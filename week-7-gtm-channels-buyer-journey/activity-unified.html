<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTM Channels & Buyer Journey Workshop</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
        }
        .laptop-textarea {
            min-height: 80px;
            max-height: 160px;
            transition: max-height 0.3s ease;
            resize: vertical;
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-icon {
            width: 48px;
            height: 48px;
            background-color: #FF9000;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .lucide-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .journey-card {
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            background: white;
            transition: all 0.3s ease;
        }
        .journey-card:hover {
            border-color: #FF9000;
            box-shadow: 0 8px 24px rgba(255, 144, 0, 0.12);
        }
        .stage-title {
            color: #FF9000;
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .stage-description {
            color: #8a8a8a;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .table-header {
            background-color: #f9fafb;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            color: #6b7280;
        }
        .channel-row:nth-child(even) {
            background-color: #f9fafb;
        }
        .channel-row:hover {
            background-color: #fef3c7;
            transition: background-color 0.2s ease;
        }
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
        .metrics-highlight {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-left: 4px solid #55BFFA;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="application/json" id="testData">
    {
        "currentStep": 3,
        "step1": {
            "awareness": {
                "behaviors": "Experiencing API monitoring challenges, noticing increased downtime incidents, searching for 'API monitoring best practices' on Google, asking peers in developer communities about their monitoring setups",
                "channels": "Google Search, Dev community forums (Reddit, Stack Overflow), LinkedIn articles, Industry newsletters, Developer podcasts",
                "needs": "Understanding of monitoring best practices, cost of downtime calculations, comparison of build vs buy solutions, industry benchmarks for API performance"
            },
            "consideration": {
                "behaviors": "Comparing monitoring solutions, reading detailed case studies, attending webinars and demos, evaluating integration capabilities with existing tech stack, discussing internally with engineering team",
                "channels": "Vendor websites, G2/Capterra review sites, Technical webinars, YouTube tutorials, Direct vendor outreach, Partner recommendations",
                "needs": "Feature comparison matrices, detailed pricing models, integration documentation, ROI calculators, customer success stories, technical requirements"
            },
            "decision": {
                "behaviors": "Requesting personalized demos, negotiating contracts, getting stakeholder buy-in, running proof of concept, checking references, finalizing security reviews",
                "channels": "Direct sales engagement, Partner/reseller channels, Proof of concept environments, Executive briefings, Reference calls",
                "needs": "Custom ROI calculations, implementation timelines, SLA guarantees, support quality metrics, contract terms, security certifications"
            }
        },
        "channels": [
            {
                "id": 1,
                "channelType": "Direct",
                "channelName": "Content Marketing & SEO",
                "rationale": "Targets developers searching for API monitoring solutions during awareness stage. Our technical blog content and documentation can rank for high-intent keywords like 'API monitoring best practices' that our ICP searches for.",
                "metric": "Monthly organic traffic growth, MQLs from content, keyword ranking improvements"
            },
            {
                "id": 2,
                "channelType": "Partner",
                "channelName": "Cloud Platform Marketplaces",
                "rationale": "Reaches buyers already using AWS/Azure who need monitoring. These marketplaces provide built-in trust and simplified procurement for enterprise buyers evaluating solutions.",
                "metric": "Partner-sourced pipeline value, marketplace listing conversions, co-sell opportunities"
            },
            {
                "id": 3,
                "channelType": "Direct",
                "channelName": "Developer Community Engagement",
                "rationale": "Builds trust through technical content and open source contributions. Developers influence tool selection and prefer vendors who contribute to the community they're part of.",
                "metric": "GitHub stars, community-generated leads, developer NPS, conference speaking engagements"
            }
        ]
    }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const WORKSHOP_STORAGE_KEY = 'workshopState_gtm_channels_buyer_journey';

        // --- Icons ---
        const CheckCircle = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/>
            </svg>
        );

        const TrashIcon = ({ size = 18, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const PlusCircleIcon = ({ size = 18, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
        );

        const MetricsIcon = ({ size = 24, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 3v18h18"></path>
                <path d="M7 12l3-3 3 3 5-5"></path>
            </svg>
        );

        // --- Helper Components ---
        const StepIndicator = ({ currentStep, steps, onStepClick }) => (
            <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                <div className="flex justify-between items-center">
                    {steps.map((step, index) => (
                        <React.Fragment key={step.number}>
                            <div
                                className={`flex items-center ${onStepClick ? 'cursor-pointer' : ''}`}
                                onClick={() => onStepClick && onStepClick(step.number)}
                            >
                                <div className={`step-icon ${
                                    currentStep === step.number ? 'bg-orange-500' :
                                    currentStep > step.number ? 'bg-green-500' : 'bg-gray-400'
                                }`}>
                                    {currentStep > step.number ? <CheckCircle size={24} /> : step.number}
                                </div>
                                <div className="ml-3 hidden md:block text-left">
                                    <p className="text-sm font-medium text-gray-900">{step.title}</p>
                                    <p className="text-xs text-gray-500">{step.desc}</p>
                                </div>
                            </div>
                            {index < steps.length - 1 && (
                                <div className="flex-1 mx-4 h-px bg-gray-300"></div>
                            )}
                        </React.Fragment>
                    ))}
                </div>
            </div>
        );

        // --- Main Component ---
        const WorkshopApp = () => {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem(WORKSHOP_STORAGE_KEY);
                const initialState = saved ? JSON.parse(saved) : {
                    currentStep: 1,
                    step1: {
                        awareness: { behaviors: '', channels: '', needs: '' },
                        consideration: { behaviors: '', channels: '', needs: '' },
                        decision: { behaviors: '', channels: '', needs: '' }
                    },
                    channels: [
                        { id: 1, channelType: '', channelName: '', rationale: '', metric: '' },
                        { id: 2, channelType: '', channelName: '', rationale: '', metric: '' },
                        { id: 3, channelType: '', channelName: '', rationale: '', metric: '' }
                    ]
                };

                const params = new URLSearchParams(window.location.search);
                const stepParam = params.get('step');
                if (stepParam) {
                    initialState.currentStep = parseInt(stepParam, 10);
                }

                return initialState;
            });

            useEffect(() => {
                localStorage.setItem(WORKSHOP_STORAGE_KEY, JSON.stringify(state));
            }, [state]);

            const [devMode, setDevMode] = useState(false);
            const toggleDevMode = () => setDevMode(!devMode);

            const devFillData = () => {
                try {
                    const testData = JSON.parse(document.getElementById('testData').textContent);
                    setState(testData);
                } catch (e) {
                    console.error("Failed to load test data", e);
                }
            };

            const updateState = (updates) => setState(prev => ({ ...prev, ...updates }));

            const handleStageUpdate = (stage, field, value) => {
                setState(prev => ({
                    ...prev,
                    step1: {
                        ...prev.step1,
                        [stage]: {
                            ...prev.step1[stage],
                            [field]: value
                        }
                    }
                }));
            };

            const handleChannelUpdate = (id, field, value) => {
                setState(prev => ({
                    ...prev,
                    channels: prev.channels.map(channel => 
                        channel.id === id ? { ...channel, [field]: value } : channel
                    )
                }));
            };

            const addChannel = () => {
                const maxId = state.channels.length > 0 ? Math.max(...state.channels.map(c => c.id)) : 0;
                setState(prev => ({
                    ...prev,
                    channels: [...prev.channels, {
                        id: maxId + 1,
                        channelType: '',
                        channelName: '',
                        rationale: '',
                        metric: ''
                    }]
                }));
            };

            const removeChannel = (id) => {
                if (state.channels.length > 1) {
                    setState(prev => ({
                        ...prev,
                        channels: prev.channels.filter(channel => channel.id !== id)
                    }));
                }
            };

            const steps = [
                { number: 1, title: "Buyer Journey", desc: "Map Behaviors & Needs" },
                { number: 2, title: "Channel Strategy", desc: "Hypothesis & Rationale" },
                { number: 3, title: "Success Metrics", desc: "Measurable Outcomes" }
            ];

            const stageConfig = [
                {
                    id: 'awareness',
                    title: 'Awareness',
                    description: 'The buyer is experiencing a problem or opportunity.',
                    icon: '🎯'
                },
                {
                    id: 'consideration',
                    title: 'Consideration',
                    description: 'The buyer is defining their problem and researching solutions.',
                    icon: '🔍'
                },
                {
                    id: 'decision',
                    title: 'Decision',
                    description: 'The buyer is evaluating specific vendors and building a business case.',
                    icon: '✅'
                }
            ];

            const generateMarkdown = () => {
                const { step1, channels } = state;
                const timestamp = new Date().toLocaleString();
                const validChannels = channels.filter(ch => ch.channelName || ch.rationale || ch.metric);
                
                return `# GTM Channel Strategy & Buyer Journey Map
Generated: ${timestamp}

## 1. Buyer Journey Analysis

${stageConfig.map(stage => `
### ${stage.icon} ${stage.title} Stage
*${stage.description}*

**Buyer Behaviors:**
${step1[stage.id].behaviors || '[Not provided]'}

**Channels Buyer Uses:**
${step1[stage.id].channels || '[Not provided]'}

**Information Needs:**
${step1[stage.id].needs || '[Not provided]'}
`).join('\n---')}

---

## 2. Channel Strategy Matrix

${validChannels.length === 0 ? '*No channels defined yet.*' : validChannels.map((channel, index) => `
### Channel ${index + 1}: ${channel.channelName || '[Unnamed Channel]'}

**📋 Type:** ${channel.channelType || '[Not specified]'}

**🎯 Strategic Rationale:**
${channel.rationale || '[No rationale provided]'}

**📊 Success Metrics:**
${channel.metric || '[No metrics defined]'}

**✅ Readiness Status:** ${channel.channelName && channel.rationale && channel.metric ? 'Ready for execution' : 'Needs completion'}
`).join('\n---')}

## 3. Implementation Priorities

### High Priority (Complete Definition)
${channels.filter(ch => ch.channelName && ch.rationale && ch.metric).map((ch, i) => `${i + 1}. **${ch.channelName}** - ${ch.channelType}`).join('\n') || 'None yet - complete channel definitions first'}

### Needs Completion
${channels.filter(ch => ch.channelName && (!ch.rationale || !ch.metric)).map(ch => `• **${ch.channelName}** - Missing ${!ch.rationale ? 'rationale' : ''}${!ch.rationale && !ch.metric ? ' and ' : ''}${!ch.metric ? 'metrics' : ''}`).join('\n') || 'All defined channels are complete'}

## Channel Distribution Analysis
**Total Channels:** ${validChannels.length}
**Direct Channels:** ${validChannels.filter(ch => ch.channelType === 'Direct').length}
**Partner Channels:** ${validChannels.filter(ch => ch.channelType === 'Partner').length}
`;
            };

            const handleCopyToClipboard = () => {
                const markdown = generateMarkdown();
                navigator.clipboard.writeText(markdown).then(() => {
                    alert('Strategy exported to clipboard!');
                });
            };

            const renderStep1 = () => (
                <div className="animate-fadeIn">
                    <h2 className="text-lg font-semibold text-gray-800 mb-4">
                        Buyer Journey Map
                    </h2>
                    <p className="text-gray-600 mb-6 text-sm">
                        Outline the key stages of your target buyer's decision-making process. What are they doing, what channels do they use, and what information do they need at each step?
                    </p>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {stageConfig.map((stage) => (
                            <div key={stage.id} className="journey-card">
                                <div className="flex items-center gap-2 mb-3">
                                    <span className="text-2xl">{stage.icon}</span>
                                    <h3 className="stage-title">{stage.title}</h3>
                                </div>
                                <p className="stage-description">{stage.description}</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Buyer Behaviors
                                        </label>
                                        <textarea
                                            value={state.step1[stage.id].behaviors}
                                            onChange={(e) => handleStageUpdate(stage.id, 'behaviors', e.target.value)}
                                            placeholder="e.g., Searching on Google, asking peers for recommendations..."
                                            className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm transition-all focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500 outline-none"
                                            rows="3"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Channels Buyer Uses (ICP Preference)
                                        </label>
                                        <textarea
                                            value={state.step1[stage.id].channels}
                                            onChange={(e) => handleStageUpdate(stage.id, 'channels', e.target.value)}
                                            placeholder="e.g., Google Search, LinkedIn, Industry Conferences, Word-of-Mouth"
                                            className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm transition-all focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500 outline-none"
                                            rows="3"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">
                                            Information Needs
                                        </label>
                                        <textarea
                                            value={state.step1[stage.id].needs}
                                            onChange={(e) => handleStageUpdate(stage.id, 'needs', e.target.value)}
                                            placeholder="e.g., 'How much does it cost?', 'What is the ROI?', 'Which vendors are best?'"
                                            className="laptop-textarea w-full p-3 border border-gray-300 rounded-lg text-sm transition-all focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500 outline-none"
                                            rows="3"
                                        />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderStep2 = () => (
                <div className="animate-fadeIn">
                    <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">
                            <span className="text-orange-600 font-bold">2</span>
                        </div>
                        <h2 className="text-lg font-semibold text-gray-800">
                            GTM Channel Hypothesis Matrix
                        </h2>
                    </div>
                    <p className="text-gray-600 mb-6 ml-13 text-sm">
                        Based on your buyer's journey, hypothesize and prioritize your core channels and explain their rationale. You'll define metrics in the next step.
                    </p>

                    <div className="overflow-x-auto">
                        <div className="min-w-[800px]">
                            <div className="grid grid-cols-12 gap-4 p-4 table-header rounded-t-lg">
                                <div className="col-span-2">Channel Type</div>
                                <div className="col-span-3">Proposed Channel</div>
                                <div className="col-span-6">Channel Rationale</div>
                                <div className="col-span-1 text-center">Action</div>
                            </div>
                            
                            {state.channels.map((channel) => (
                                <div key={channel.id} className="grid grid-cols-12 gap-4 p-4 items-center channel-row border-b border-gray-100">
                                    <div className="col-span-2">
                                        <select
                                            value={channel.channelType}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'channelType', e.target.value)}
                                            className="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:border-blue-400 transition-colors appearance-none"
                                        >
                                            <option value="">Select type</option>
                                            <option value="Direct">Direct</option>
                                            <option value="Partner">Partner</option>
                                        </select>
                                    </div>
                                    
                                    <div className="col-span-3">
                                        <input
                                            type="text"
                                            value={channel.channelName}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'channelName', e.target.value)}
                                            placeholder="e.g., Content Marketing"
                                            className="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:border-blue-400 transition-colors"
                                        />
                                    </div>

                                    <div className="col-span-6">
                                        <textarea
                                            value={channel.rationale}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'rationale', e.target.value)}
                                            placeholder="Explain how this channel leverages a unique product capability..."
                                            className="laptop-textarea w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:border-blue-400 transition-colors"
                                            rows="2"
                                        />
                                    </div>

                                    <div className="col-span-1 flex justify-center">
                                        <button
                                            onClick={() => removeChannel(channel.id)}
                                            className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                            disabled={state.channels.length <= 1}
                                        >
                                            <TrashIcon />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="mt-6 flex justify-end">
                        <button
                            onClick={addChannel}
                            className="inline-flex items-center gap-2 px-5 py-2.5 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600 transition-colors"
                        >
                            <PlusCircleIcon />
                            Add Channel Hypothesis
                        </button>
                    </div>
                </div>
            );

            const renderStep3 = () => (
                <div className="animate-fadeIn">
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-6 mb-6 metrics-highlight">
                        <div className="flex items-center gap-3 mb-3">
                            <MetricsIcon className="text-blue-600" />
                            <h3 className="text-lg font-semibold text-blue-900">Final Step: Define Success Metrics</h3>
                        </div>
                        <p className="text-blue-700 text-sm leading-relaxed">
                            Complete your channel strategy by defining specific, measurable success metrics for each channel. 
                            These metrics will guide your execution and help you optimize performance over time.
                        </p>
                    </div>

                    <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">
                            <span className="text-orange-600 font-bold">3</span>
                        </div>
                        <h2 className="text-lg font-semibold text-gray-800">
                            Channel Success Metrics
                        </h2>
                    </div>
                    <p className="text-gray-600 mb-6 ml-13 text-sm">
                        Now, define a key metric for each channel to measure its success. Refine your entire strategy with measurable outcomes.
                    </p>

                    <div className="overflow-x-auto">
                        <div className="min-w-[900px]">
                            <div className="grid grid-cols-12 gap-4 p-4 table-header rounded-t-lg">
                                <div className="col-span-2">Channel Type</div>
                                <div className="col-span-3">Proposed Channel</div>
                                <div className="col-span-4">Channel Rationale</div>
                                <div className="col-span-2">Key Metric</div>
                                <div className="col-span-1 text-center">Action</div>
                            </div>
                            
                            {state.channels.map((channel) => (
                                <div key={channel.id} className="grid grid-cols-12 gap-4 p-4 items-center channel-row border-b border-gray-100">
                                    <div className="col-span-2">
                                        <select
                                            value={channel.channelType}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'channelType', e.target.value)}
                                            className="w-full p-2.5 border border-gray-300 rounded-lg text-sm appearance-none"
                                        >
                                            <option value="">Select type</option>
                                            <option value="Direct">Direct</option>
                                            <option value="Partner">Partner</option>
                                        </select>
                                    </div>
                                    
                                    <div className="col-span-3">
                                        <input
                                            type="text"
                                            value={channel.channelName}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'channelName', e.target.value)}
                                            className="w-full p-2.5 border border-gray-300 rounded-lg text-sm"
                                        />
                                    </div>

                                    <div className="col-span-4">
                                        <textarea
                                            value={channel.rationale}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'rationale', e.target.value)}
                                            className="laptop-textarea w-full p-2.5 border border-gray-300 rounded-lg text-sm"
                                            rows="2"
                                        />
                                    </div>

                                    <div className="col-span-2">
                                        <input
                                            type="text"
                                            value={channel.metric}
                                            onChange={(e) => handleChannelUpdate(channel.id, 'metric', e.target.value)}
                                            placeholder="e.g., MQLs, Pipeline"
                                            className="w-full p-2.5 border border-blue-300 rounded-lg text-sm bg-blue-50 focus:border-blue-500 outline-none"
                                        />
                                    </div>
                                    
                                    <div className="col-span-1 flex justify-center">
                                        <button
                                            onClick={() => removeChannel(channel.id)}
                                            className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                            disabled={state.channels.length <= 1}
                                        >
                                            <TrashIcon />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="mt-8 p-8 bg-green-50 border-2 border-green-200 rounded-2xl animate-fadeIn">
                        <h3 className="text-2xl font-bold text-green-800 mb-4 flex items-center gap-3">
                            <CheckCircle size={32} />
                            Strategy Complete
                        </h3>
                        <p className="text-green-700 mb-6">You've successfully mapped your buyer journey and defined measurable channel strategies. Export your work and begin execution!</p>

                        <div className="bg-white p-6 rounded-xl shadow-inner mb-6">
                            <h4 className="font-bold text-gray-700 mb-2 flex items-center gap-2">Markdown Export</h4>
                            <textarea
                                readOnly
                                className="w-full h-48 p-4 font-mono text-[10px] border border-gray-200 rounded-lg bg-gray-50"
                                value={generateMarkdown()}
                            />
                        </div>

                        <div className="flex justify-center">
                            <button
                                onClick={handleCopyToClipboard}
                                className="bg-green-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition-all shadow-lg flex items-center gap-2"
                            >
                                Copy Complete Strategy
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-[900px] mx-auto p-4 md:p-8 text-gray-800">
                    <div className="flex justify-between items-center mb-4">
                        <a href="index.html" className="text-orange-500 hover:text-orange-600 font-bold text-sm">Back to Workshop</a>
                        <a href="../index.html" className="text-orange-500 hover:text-orange-600 font-bold text-sm">All Workshops</a>
                    </div>

                    <h1
                        className={`text-3xl font-bold mb-2 cursor-pointer select-none transition-colors ${devMode ? 'text-orange-600' : 'text-gray-800'}`}
                        onDoubleClick={toggleDevMode}
                    >
                        GTM Channels & Buyer Journey {devMode && '[dev]'}
                    </h1>
                    <p className="text-gray-600 mb-6">Map your buyer's journey and define your go-to-market channel hypothesis.</p>

                    {devMode && (
                        <div className="mb-4 p-3 bg-orange-50 border border-orange-200 rounded-lg flex items-center justify-between animate-fadeIn">
                            <span className="text-xs text-orange-600 font-medium">Dev Mode Active</span>
                            <button onClick={devFillData} className="bg-orange-500 text-white px-3 py-1 rounded text-xs hover:bg-orange-600">Fill Test Data</button>
                        </div>
                    )}

                    <StepIndicator currentStep={state.currentStep} steps={steps} onStepClick={(n) => updateState({ currentStep: n })} />

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-10 mb-6 min-h-[500px]">
                        {state.currentStep === 1 && renderStep1()}
                        {state.currentStep === 2 && renderStep2()}
                        {state.currentStep === 3 && renderStep3()}
                    </div>

                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                        <button
                            onClick={() => updateState({ currentStep: Math.max(1, state.currentStep - 1) })}
                            disabled={state.currentStep === 1}
                            className={`px-6 py-2 rounded-lg font-bold transition-all ${state.currentStep === 1 ? 'opacity-0 pointer-events-none' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                        >
                            Back
                        </button>
                        <button
                            onClick={() => { if (confirm('Clear all work?')) { localStorage.removeItem(WORKSHOP_STORAGE_KEY); window.location.reload(); } }}
                            className="text-gray-400 text-xs hover:text-red-500 font-medium uppercase tracking-wider"
                        >
                            Reset Workshop
                        </button>
                        <button
                            onClick={() => { if (state.currentStep < 3) updateState({ currentStep: state.currentStep + 1 }); }}
                            className={`px-8 py-3 rounded-lg font-bold shadow-lg transition-all ${
                                state.currentStep === 3 ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-orange-500 text-white hover:bg-orange-600'
                            }`}
                        >
                            {state.currentStep === 3 ? 'Workshop Complete' : 'Continue'}
                        </button>
                    </div>
                    <footer className="mt-12 py-8 border-t border-gray-100 text-center text-xs text-gray-400">
                        GTM Channels & Buyer Journey — GTM Program — 2026
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WorkshopApp />);
    </script>
</body>
</html>
