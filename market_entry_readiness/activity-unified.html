<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Entry Readiness Workshop</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
        }
        .laptop-textarea {
            min-height: 80px;
            max-height: 120px;
            transition: max-height 0.3s ease;
            resize: none;
        }
        .laptop-textarea:focus {
            max-height: 200px;
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-icon {
            width: 48px;
            height: 48px;
            background-color: #FF9000;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .lucide-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .priority-item {
            transition: all 0.2s ease;
        }
        .priority-item.selected {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 144, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="application/json" id="testData">
    {
      "currentStep": 3,
      "currentPosition": {
        "uniqueAttributes": {
          "localStrength": "Proprietary ML-powered predictive analytics engine that prevents API failures before they occur",
          "globalLimitation": "No established brand recognition in competitive US market dominated by Datadog and New Relic"
        },
        "marketKnowledge": {
          "localStrength": "Deep understanding of Japanese enterprise API infrastructure and relationship-based sales cycles",
          "globalLimitation": "Limited knowledge of US ROI-focused buying processes and fast adoption cycles"
        },
        "resources": {
          "localStrength": "Strong technical team with proven API monitoring expertise and $2M in local revenue",
          "globalLimitation": "Limited financial resources ($1.25M budget) for aggressive US market entry against well-funded competitors"
        },
        "networkRelationships": {
          "localStrength": "Established partnerships with major Japanese cloud providers and system integrators",
          "globalLimitation": "No existing relationships with US cloud providers, DevOps platforms, or enterprise prospects"
        },
        "infrastructure": {
          "localStrength": "Mature product with proven reliability in Japanese market and Tokyo-based support operations",
          "globalLimitation": "Lack of US-based infrastructure, sales team, and multi-timezone support capabilities"
        }
      },
      "sixMonthMetrics": [
        "US enterprise pilots",
        "Technical integrations",
        "Sales partnerships"
      ],
      "sixMonthTargets": [
        "3 Fortune 500 pilot customers",
        "5 major platform integrations",
        "2 US channel partner agreements"
      ],
      "twelveMonthMetrics": [
        "Annual Recurring Revenue (ARR)",
        "Customer acquisition",
        "Product-market fit indicators"
      ],
      "twelveMonthTargets": [
        "$1.5M ARR from US market",
        "15 enterprise customers",
        "95% customer satisfaction (NPS >50)"
      ],
      "factorData": {
        "market_size": {
          "japan": "Emerging API monitoring market ($200M), with conservative enterprise adoption.",
          "us": "Large, mature market ($8B), characterized by aggressive digital transformation."
        },
        "customer_dynamics": {
          "japan": "Features relationship-based sales, consensus-driven decisions, and long evaluation cycles.",
          "us": "Driven by ROI-focused decisions, faster adoption of innovative tools, and shorter sales cycles."
        },
        "competitive_landscape": {
          "japan": "Characterized by limited local competitors and dominant traditional monitoring tools.",
          "us": "Highly competitive, with sophisticated buyers and established players like Datadog, New Relic, and Dynatrac."
        },
        "regulatory_environment": {
          "japan": "Features basic data protection and limited compliance requirements.",
          "us": "Requires adherence to SOC2 and GDPR compliance, along with enterprise security standards."
        },
        "operational_needs": {
          "japan": "Primarily relies on a direct sales model and Tokyo-based support.",
          "us": "Needs a US sales team, local customer success, and 24/7 support."
        }
      },
      "priorities": [
        "regulatory_environment",
        "operational_needs", 
        "competitive_landscape"
      ],
      "adaptationNotes": "To address these gaps, Posh will pursue SOC2 Type II certification and implement robust enterprise security features. A dedicated US sales organization will be built, along with establishing a West Coast presence and a multi-timezone support model. Furthermore, Posh will focus on clearly articulating its predictive AI positioning and superior automation narrative to differentiate from existing competitors.",
      "entryApproach": "Posh's go-to-market strategy involves a direct sales model combined with strategic technology partnerships, focusing on leveraging cloud providers and DevOps platforms.",
      "resourceAllocation": "Budget will be allocated towards SOC2 compliance and security efforts ($150K), building a US sales team ($800K for 4 people), and marketing with demand generation ($300K).",
      "teamBuilding": "The strategy involves building a US-based sales team, establishing local customer success resources, and ensuring 24/7 support across multiple time zones for the target market.",
      "milestones": [
        {
          "month": "Month 1-2",
          "goal": "Establish foundational cloud partnerships and initiate compliance.",
          "successCriteria": "Secure 2-3 major cloud provider partnerships (AWS, Azure, GCP). Begin SOC2 compliance and security efforts."
        },
        {
          "month": "Month 3-4",
          "goal": "Form the US sales team and achieve initial platform integrations.",
          "successCriteria": "Hire a 4-person US sales team. Complete 5 major DevOps platform integrations."
        },
        {
          "month": "Month 5-6",
          "goal": "Acquire initial pilot customers and launch marketing campaigns.",
          "successCriteria": "Secure 3 Fortune 500 pilot customers. Initiate comprehensive marketing and demand generation."
        },
        {
          "month": "Month 7-8",
          "goal": "Expand system integrator partnerships and accelerate customer acquisition.",
          "successCriteria": "Secure 1-2 system integrator (SI) partner agreements. Progress towards enterprise customer targets."
        },
        {
          "month": "Month 9-10",
          "goal": "Scale the customer base and refine product-market fit.",
          "successCriteria": "Continue acquiring enterprise customers towards the 12-month goal. Gather early product-market fit indicators."
        },
        {
          "month": "Month 11-12",
          "goal": "Achieve annual revenue and customer satisfaction targets.",
          "successCriteria": "Attain $1.5M ARR from the US market. Secure 15 enterprise customers. Achieve 95% customer satisfaction (NPS >50)."
        }
      ]
    }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CheckCircle = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22,4 12,14.01 9,11.01"/>
            </svg>
        );
        const WordCountFeedback = ({ text = '', minWords = 5 }) => {
            const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            const isValid = wordCount >= minWords;
            return (
                <div className="flex justify-between items-center mt-1">
                    <span className="text-xs text-gray-500">(write {minWords}+ words)</span>
                    <span className={`text-sm flex items-center gap-1 ${isValid ? 'text-green-600' : 'text-gray-500'}`}>
                        {wordCount} words {isValid && <CheckCircle size={14} />}
                    </span>
                </div>
            );
        };
        
        const WORKSHOP_STORAGE_KEY = 'workshopState_market_entry_readiness';

        // --- Icons ---
        const Building = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect width="16" height="20" x="4" y="2" rx="2" ry="2"/>
                <path d="M9 22v-4h6v4"/>
                <path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/>
            </svg>
        );

        const Target = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
            </svg>
        );

        const TrendingUp = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="22,7 13.5,15.5 8.5,10.5 2,17"/><polyline points="16,7 22,7 22,13"/>
            </svg>
        );



        const AlertTriangle = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        );

        const Clock = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
            </svg>
        );

        const Rocket = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M4.5 16.5c-1.5 1.5-2 4.5-2 4.5s3-0.5 4.5-2c1.5-1.5 1.5-4 1.5-4s-2.5 0-4 1.5"/>
                <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
            </svg>
        );

        const Calendar = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        );

        const Users = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        );

        const DollarSign = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        );

        const FileText = ({ size = 20, className = "" }) => (
            <svg className={`lucide-icon ${className}`} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/>
            </svg>
        );

        // --- Helper Components ---
        + words)</span>
                    <span className={`text-sm flex items-center gap-1 ${isValid ? 'text-green-600' : 'text-gray-500'}`}>
                        {wordCount} words {isValid && <CheckCircle size={14} />}
                    </span>
                </div>
            );
        };

        const AlertBox = ({ type = 'info', title, children }) => {
            const styles = {
                info: 'bg-blue-50 border-blue-200 text-blue-800',
                warning: 'bg-amber-50 border-amber-200 text-amber-800',
                success: 'bg-green-50 border-green-200 text-green-800',
                orange: 'bg-orange-50 border-orange-200 text-orange-800'
            };
            return (
                <div className={`border rounded-lg p-4 my-4 ${styles[type]}`}>
                    {title && <h4 className="text-sm font-bold mb-1">{title}</h4>}
                    <div className="text-xs">{children}</div>
                </div>
            );
        };

        const StepIndicator = ({ currentStep, steps, onStepClick }) => (
            <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                <div className="flex justify-between items-center">
                    {steps.map((step, index) => (
                        <React.Fragment key={step.number}>
                            <div
                                className={`flex items-center ${onStepClick ? 'cursor-pointer' : ''}`}
                                onClick={() => onStepClick && onStepClick(step.number)}
                            >
                                <div className={`step-icon ${
                                    step.complete ? 'bg-green-500' :
                                    currentStep === step.number ? 'bg-orange-500' :
                                    currentStep > step.number ? 'bg-green-500' : 'bg-gray-400'
                                }`}>
                                    {step.complete || currentStep > step.number ? <CheckCircle size={24} /> : step.number}
                                </div>
                                <div className="ml-3 hidden md:block">
                                    <p className="text-sm font-medium text-gray-900">{step.title}</p>
                                    <p className="text-xs text-gray-500">{step.desc}</p>
                                </div>
                            </div>
                            {index < steps.length - 1 && (
                                <div className="flex-1 mx-4 h-px bg-gray-300"></div>
                            )}
                        </React.Fragment>
                    ))}
                </div>
            </div>
        );

        // --- Main Component ---
        const WorkshopApp = () => {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem(WORKSHOP_STORAGE_KEY);
                const initialState = saved ? JSON.parse(saved) : {
                    currentStep: 1,
                    // Step 1
                    currentPosition: {
                        uniqueAttributes: { localStrength: '', globalLimitation: '' },
                        marketKnowledge: { localStrength: '', globalLimitation: '' },
                        resources: { localStrength: '', globalLimitation: '' },
                        networkRelationships: { localStrength: '', globalLimitation: '' },
                        infrastructure: { localStrength: '', globalLimitation: '' }
                    },
                    sixMonthMetrics: ['', '', ''],
                    sixMonthTargets: ['', '', ''],
                    twelveMonthMetrics: ['', '', ''],
                    twelveMonthTargets: ['', '', ''],
                    // Step 2
                    factorData: {
                        market_size: { japan: '', us: '' },
                        customer_dynamics: { japan: '', us: '' },
                        competitive_landscape: { japan: '', us: '' },
                        regulatory_environment: { japan: '', us: '' },
                        operational_needs: { japan: '', us: '' }
                    },
                    priorities: [],
                    adaptationNotes: '',
                    // Step 3
                    entryApproach: '',
                    resourceAllocation: '',
                    teamBuilding: '',
                    milestones: [
                        { month: 'Month 1-2', goal: '', successCriteria: '' },
                        { month: 'Month 3-4', goal: '', successCriteria: '' },
                        { month: 'Month 5-6', goal: '', successCriteria: '' },
                        { month: 'Month 7-8', goal: '', successCriteria: '' },
                        { month: 'Month 9-10', goal: '', successCriteria: '' },
                        { month: 'Month 11-12', goal: '', successCriteria: '' }
                    ]
                };

                // URL step override
                const params = new URLSearchParams(window.location.search);
                const stepParam = params.get('step');
                if (stepParam) {
                    initialState.currentStep = parseInt(stepParam, 10);
                }

                return initialState;
            });

            useEffect(() => {
                localStorage.setItem(WORKSHOP_STORAGE_KEY, JSON.stringify(state));
            }, [state]);

            const [devMode, setDevMode] = useState(false);
            const toggleDevMode = () => setDevMode(!devMode);

            const devFillData = () => {
                try {
                    const testData = JSON.parse(document.getElementById('testData').textContent);
                    setState(testData);
                } catch (e) {
                    console.error("Failed to load test data", e);
                }
            };

            const updateState = (updates) => setState(prev => ({ ...prev, ...updates }));

            const updateCurrentPosition = (element, field, value) => {
                updateState({
                    currentPosition: {
                        ...state.currentPosition,
                        [element]: { ...state.currentPosition[element], [field]: value }
                    }
                });
            };

            const updateArrayItem = (key, index, value) => {
                const newArr = [...state[key]];
                newArr[index] = value;
                updateState({ [key]: newArr });
            };

            const updateFactorData = (factorId, field, value) => {
                updateState({
                    factorData: {
                        ...state.factorData,
                        [factorId]: { ...state.factorData[factorId], [field]: value }
                    }
                });
            };

            const togglePriority = (factorId) => {
                const newPriorities = state.priorities.includes(factorId)
                    ? state.priorities.filter(id => id !== factorId)
                    : state.priorities.length < 3 ? [...state.priorities, factorId] : state.priorities;
                updateState({ priorities: newPriorities });
            };

            const updateMilestone = (index, field, value) => {
                const newMilestones = [...state.milestones];
                newMilestones[index] = { ...newMilestones[index], [field]: value };
                updateState({ milestones: newMilestones });
            };

            // Validation
            const isStep1Complete = () => {
                const elements = Object.values(state.currentPosition);
                const completeElements = elements.filter(el => 
                    el.localStrength.trim().split(/\s+/).filter(w => w.length > 0).length >= 10 &&
                    el.globalLimitation.trim().split(/\s+/).filter(w => w.length > 0).length >= 10
                ).length;
                const metrics6 = state.sixMonthMetrics.filter((m, i) => m.trim().length >= 5 && state.sixMonthTargets[i].trim().length >= 5).length;
                const metrics12 = state.twelveMonthMetrics.filter((m, i) => m.trim().length >= 5 && state.twelveMonthTargets[i].trim().length >= 5).length;
                return completeElements >= 4 && metrics6 >= 2 && metrics12 >= 2;
            };

            const isStep2Complete = () => {
                const factors = Object.keys(state.factorData);
                const completeFactors = factors.filter(f => 
                    state.factorData[f].japan.trim().length >= 25 && state.factorData[f].us.trim().length >= 25
                ).length;
                return completeFactors >= 4 && state.priorities.length >= 3 && state.adaptationNotes.trim().length >= 50;
            };

            const isStep3Complete = () => {
                const approachWords = state.entryApproach.trim().split(/\s+/).filter(w => w.length > 0).length;
                const resourceWords = state.resourceAllocation.trim().split(/\s+/).filter(w => w.length > 0).length;
                const teamWords = state.teamBuilding.trim().split(/\s+/).filter(w => w.length > 0).length;
                const completeMilestones = state.milestones.filter(m => 
                    m.goal.trim().split(/\s+/).filter(w => w.length > 0).length >= 5 &&
                    m.successCriteria.trim().split(/\s+/).filter(w => w.length > 0).length >= 5
                ).length;
                return approachWords >= 10 && resourceWords >= 10 && teamWords >= 10 && completeMilestones >= 4;
            };

            const steps = [
                { number: 1, title: "Foundation & Goals", desc: "Assess readiness", complete: isStep1Complete() },
                { number: 2, title: "Market Check", desc: "Gap analysis", complete: isStep2Complete() },
                { number: 3, title: "Entry Strategy", desc: "12-month roadmap", complete: isStep3Complete() }
            ];

            // Render functions
            const renderStep1 = () => {
                const elements = [
                    { key: 'uniqueAttributes', name: 'Unique Attributes' },
                    { key: 'marketKnowledge', name: 'Market Knowledge' },
                    { key: 'resources', name: 'Resources' },
                    { key: 'networkRelationships', name: 'Network/Relationships' },
                    { key: 'infrastructure', name: 'Infrastructure' }
                ];
                return (
                    <div className="animate-fadeIn space-y-8">
                        <div>
                            <h3 className="text-xl font-bold text-gray-800 mb-4">Current Position Assessment</h3>
                            <div className="space-y-6">
                                {elements.map(el => (
                                    <div key={el.key} className="border-2 border-gray-100 rounded-lg p-4">
                                        <h4 className="font-bold text-gray-700 mb-3">{el.name}</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-green-700 uppercase mb-1">Local Strengths</label>
                                                <textarea value={state.currentPosition[el.key].localStrength}
                                                    onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateCurrentPosition(el.key, 'localStrength', e.target.value)}
                                                    className="laptop-textarea w-full p-2 border border-gray-300 rounded text-sm"
                                                    placeholder="Describe your strengths in your home market..."
                                                />
                                                <WordCountFeedback text={state.currentPosition[el.key].localStrength} minWords={10} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-orange-700 uppercase mb-1">Global Limitations</label>
                                                <textarea value={state.currentPosition[el.key].globalLimitation}
                                                    onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateCurrentPosition(el.key, 'globalLimitation', e.target.value)}
                                                    className="laptop-textarea w-full p-2 border border-gray-300 rounded text-sm"
                                                    placeholder="Describe limitations for international expansion..."
                                                />
                                                <WordCountFeedback text={state.currentPosition[el.key].globalLimitation} minWords={10} />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div>
                            <h3 className="text-xl font-bold text-gray-800 mb-4 text-center">Success Metrics Builder</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-blue-50 p-4 rounded-lg">
                                    <h4 className="font-bold text-blue-800 mb-4 flex items-center"><Clock className="mr-2"/> 6-Month Targets</h4>
                                    {[0,1,2].map(i => (
                                        <div key={i} className="mb-4">
                                            <input value={state.sixMonthMetrics[i]}
                                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateArrayItem('sixMonthMetrics', i, e.target.value)}
                                                className="w-full p-2 border border-blue-200 rounded text-sm mb-1"
                                                placeholder={`Metric #${i+1} (e.g. Pilots)`}
                                            />
                                            <textarea value={state.sixMonthTargets[i]}
                                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateArrayItem('sixMonthTargets', i, e.target.value)}
                                                className="w-full p-2 border border-blue-200 rounded text-sm"
                                                placeholder="Target Goal..."
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-purple-50 p-4 rounded-lg">
                                    <h4 className="font-bold text-purple-800 mb-4 flex items-center"><TrendingUp className="mr-2"/> 12-Month Targets</h4>
                                    {[0,1,2].map(i => (
                                        <div key={i} className="mb-4">
                                            <input value={state.twelveMonthMetrics[i]}
                                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateArrayItem('twelveMonthMetrics', i, e.target.value)}
                                                className="w-full p-2 border border-purple-200 rounded text-sm mb-1"
                                                placeholder={`Metric #${i+1} (e.g. ARR)`}
                                            />
                                            <textarea value={state.twelveMonthTargets[i]}
                                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateArrayItem('twelveMonthTargets', i, e.target.value)}
                                                className="w-full p-2 border border-purple-200 rounded text-sm"
                                                placeholder="Target Goal..."
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStep2 = () => {
                const factors = [
                    { id: 'market_size', title: 'Market Size & Growth', icon: '📊' },
                    { id: 'customer_dynamics', title: 'Customer Dynamics', icon: '👥' },
                    { id: 'competitive_landscape', title: 'Competitive Landscape', icon: '🏆' },
                    { id: 'regulatory_environment', title: 'Regulatory Environment', icon: '📋' },
                    { id: 'operational_needs', title: 'Operational Needs', icon: '🛠️' }
                ];
                return (
                    <div className="animate-fadeIn space-y-8">
                        <div className="space-y-4">
                            {factors.map(f => (
                                <div key={f.id} className="border-2 border-gray-100 rounded-lg p-4">
                                    <div className="flex items-center mb-3">
                                        <span className="text-xl mr-2">{f.icon}</span>
                                        <h4 className="font-bold text-gray-700">{f.title}</h4>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">🇯🇵 Japan Market</label>
                                            <textarea value={state.factorData[f.id].japan}
                                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateFactorData(f.id, 'japan', e.target.value)}
                                                className="laptop-textarea w-full p-2 border border-gray-300 rounded text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">🇺🇸 US Market</label>
                                            <textarea value={state.factorData[f.id].us}
                                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateFactorData(f.id, 'us', e.target.value)}
                                                className="laptop-textarea w-full p-2 border border-gray-300 rounded text-sm"
                                            />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="bg-orange-50 p-6 rounded-xl border border-orange-100">
                            <h3 className="text-lg font-bold text-orange-800 mb-4">Gap Priority & Adaptation</h3>
                            <p className="text-sm text-orange-700 mb-4">Select your top 3 priority gaps and define your strategy:</p>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6">
                                {factors.map(f => (
                                    <button
                                        key={f.id}
                                        onClick={() => togglePriority(f.id)}
                                        className={`p-2 rounded text-xs font-bold border transition-all ${
                                            state.priorities.includes(f.id)
                                                ? 'bg-orange-500 text-white border-orange-600 shadow-md transform -translate-y-1'
                                                : 'bg-white text-gray-600 border-gray-200 hover:border-orange-300'
                                        }`}
                                    >
                                        {f.title}
                                    </button>
                                ))}
                            </div>
                            <textarea value={state.adaptationNotes}
                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateState({ adaptationNotes: e.target.value })}
                                className="w-full p-4 border border-orange-200 rounded-lg text-sm"
                                placeholder="How will you address these priority gaps?"
                                rows={4}
                            />
                            <WordCountFeedback text={state.adaptationNotes} minWords={10} />
                        </div>
                    </div>
                );
            };

            const renderStep3 = () => (
                <div className="animate-fadeIn space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-orange-50 p-4 rounded-lg border border-orange-100">
                            <h4 className="font-bold text-orange-800 mb-2 flex items-center"><Rocket className="mr-2"/> Entry Approach</h4>
                            <textarea value={state.entryApproach}
                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateState({ entryApproach: e.target.value })}
                                className="laptop-textarea w-full p-2 border border-orange-200 rounded text-sm"
                                placeholder="Direct, partners, digital-first?"
                            />
                            <WordCountFeedback text={state.entryApproach} minWords={10} />
                        </div>
                        <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                            <h4 className="font-bold text-blue-800 mb-2 flex items-center"><DollarSign className="mr-2"/> Resource Allocation</h4>
                            <textarea value={state.resourceAllocation}
                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateState({ resourceAllocation: e.target.value })}
                                className="laptop-textarea w-full p-2 border border-blue-200 rounded text-sm"
                                placeholder="Budget breakdown..."
                            />
                            <WordCountFeedback text={state.resourceAllocation} minWords={10} />
                        </div>
                        <div className="bg-purple-50 p-4 rounded-lg border border-purple-100">
                            <h4 className="font-bold text-purple-800 mb-2 flex items-center"><Users className="mr-2"/> Team Building</h4>
                            <textarea value={state.teamBuilding}
                                onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateState({ teamBuilding: e.target.value })}
                                className="laptop-textarea w-full p-2 border border-purple-200 rounded text-sm"
                                placeholder="Key hires and timing..."
                            />
                            <WordCountFeedback text={state.teamBuilding} minWords={10} />
                        </div>
                    </div>
                    <div>
                        <h3 className="text-xl font-bold text-gray-800 mb-4 text-center">12-Month Implementation Timeline</h3>
                        <div className="space-y-4">
                            {state.milestones.map((m, i) => (
                                <div key={i} className="border-l-4 border-orange-500 bg-white p-4 shadow-sm rounded-r-lg">
                                    <div className="flex items-center mb-2">
                                        <Calendar className="text-orange-500 mr-2" size={16}/>
                                        <span className="font-bold text-gray-700">{m.month}</span>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <textarea value={m.goal}
                                            onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateMilestone(i, 'goal', e.target.value)}
                                            className="w-full p-2 border border-gray-200 rounded text-sm"
                                            placeholder="Primary Goal"
                                        />
                                        <textarea value={m.successCriteria}
                                            onChange={(e) = className="focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"> updateMilestone(i, 'successCriteria', e.target.value)}
                                            className="w-full p-2 border border-gray-200 rounded text-sm"
                                            placeholder="Success Criteria"
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="p-8 bg-green-50 border-2 border-green-200 rounded-2xl">
                        <h3 className="text-2xl font-bold text-green-800 mb-4 flex items-center">
                            <CheckCircle className="mr-3" size={32} />
                            Ready for Market Entry
                        </h3>
                        <p className="text-green-700 mb-6">You have completed the full Market Entry Readiness workshop. Your strategy is now documented and ready for export.</p>
                        
                        <div className="bg-white p-6 rounded-xl shadow-inner mb-6">
                            <h4 className="font-bold text-gray-700 mb-2 flex items-center"><FileText className="mr-2"/> Markdown Export</h4>
                            <textarea readOnly
                                className="w-full h-48 p-4 font-mono text-xs border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-500"
                                value={generateMarkdown()}
                            />
                        </div>
                        
                        <div className="flex justify-center">
                            <button
                                onClick={() => {
                                    navigator.clipboard.writeText(generateMarkdown());
                                    alert('Strategy exported to clipboard!');
                                }}
                                className="bg-green-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition-all shadow-lg flex items-center"
                            >
                                <FileText className="mr-2" size={24}/> Copy Strategy Summary
                            </button>
                        </div>
                    </div>
                </div>
            );

            const generateMarkdown = () => {
                const { currentPosition, sixMonthMetrics, sixMonthTargets, twelveMonthMetrics, twelveMonthTargets, factorData, priorities, adaptationNotes, entryApproach, resourceAllocation, teamBuilding, milestones } = state;
                
                let md = `# Market Entry Readiness Strategy\n\n`;
                
                const elementLabels = {
                    uniqueAttributes: 'Unique Attributes',
                    marketKnowledge: 'Market Knowledge',
                    resources: 'Resources',
                    networkRelationships: 'Network/Relationships',
                    infrastructure: 'Infrastructure'
                };

                md += `## 1. Foundation Assessment\n\n`;
                Object.entries(currentPosition).forEach(([key, val]) => {
                    md += `### ${elementLabels[key] || key}\n- **Strengths:** ${val.localStrength}\n- **Limitations:** ${val.globalLimitation}\n\n`;
                });
                
                md += `## 2. Success Metrics\n\n`;
                md += `### 6-Month Targets\n`;
                sixMonthMetrics.forEach((m, i) => { if(m) md += `- **${m}:** ${sixMonthTargets[i]}\n`; });
                md += `\n### 12-Month Targets\n`;
                twelveMonthMetrics.forEach((m, i) => { if(m) md += `- **${m}:** ${twelveMonthTargets[i]}\n`; });
                
                const factorLabels = {
                    market_size: 'Market Size & Growth',
                    customer_dynamics: 'Customer Dynamics',
                    competitive_landscape: 'Competitive Landscape',
                    regulatory_environment: 'Regulatory Environment',
                    operational_needs: 'Operational Needs'
                };

                md += `\n## 3. Market Gap Analysis\n\n`;
                Object.entries(factorData).forEach(([key, val]) => {
                    md += `### ${factorLabels[key] || key}\n- **Japan:** ${val.japan}\n- **US:** ${val.us}\n\n`;
                });
                md += `**Priority Gaps:** ${priorities.map(p => factorLabels[p] || p).join(', ')}\n\n`;
                md += `**Adaptation Strategy:** ${adaptationNotes}\n\n`;
                
                md += `## 4. Implementation Plan\n\n`;
                md += `**Approach:** ${entryApproach}\n\n`;
                md += `**Resources:** ${resourceAllocation}\n\n`;
                md += `**Team:** ${teamBuilding}\n\n`;
                
                md += `### 12-Month Timeline\n\n`;
                md += `| Period | Goal | Success Criteria |\n|---|---|---|\n`;
                milestones.forEach(m => {
                    md += `| ${m.month} | ${m.goal} | ${m.successCriteria} |\n`;
                });
                
                return md;
            };

            return (
                <div className="max-w-[900px] mx-auto p-4 md:p-8 text-gray-800">
                    <div className="flex justify-between items-center mb-4">
                        <a href="index.html" className="text-orange-500 hover:text-orange-600 font-bold text-sm">Back to Workshop</a>
                        <a href="../index.html" className="text-orange-500 hover:text-orange-600 font-bold text-sm">All Workshops</a>
                    </div>

                    <h1
                        className={`text-3xl font-bold mb-2 cursor-pointer select-none transition-colors ${devMode ? 'text-orange-600' : 'text-gray-800'}`}
                        onDoubleClick={toggleDevMode}
                    >
                        Market Entry Readiness {devMode && '[dev]'}
                    </h1>

                    {devMode && (
                        <div className="mb-4 p-3 bg-orange-50 border border-orange-200 rounded-lg flex items-center justify-between animate-fadeIn">
                            <span className="text-xs text-orange-600 font-medium">Dev Mode Active</span>
                            <button onClick={devFillData} className="bg-orange-500 text-white px-3 py-1 rounded text-xs hover:bg-orange-600">Fill Test Data</button>
                        </div>
                    )}

                    <StepIndicator currentStep={state.currentStep} steps={steps} onStepClick={(n) => updateState({ currentStep: n })} />

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-10 mb-6 min-h-[500px]">
                        {state.currentStep === 1 && renderStep1()}
                        {state.currentStep === 2 && renderStep2()}
                        {state.currentStep === 3 && renderStep3()}
                    </div>

                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                        <button 
                            onClick={() => updateState({ currentStep: Math.max(1, state.currentStep - 1) })}
                            disabled={state.currentStep === 1}
                            className={`px-6 py-2 rounded-lg font-bold transition-all ${state.currentStep === 1 ? 'opacity-0 pointer-events-none' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                        >
                            Back
                        </button>
                        <button 
                            onClick={() => { if (confirm('Clear all work?')) { localStorage.removeItem(WORKSHOP_STORAGE_KEY); window.location.reload(); } }}
                            className="text-gray-400 text-xs hover:text-red-500 font-medium uppercase tracking-wider"
                        >
                            Reset Workshop
                        </button>
                        <button 
                            onClick={() => { if (state.currentStep < 3) updateState({ currentStep: state.currentStep + 1 }); }}
                            className={`px-8 py-3 rounded-lg font-bold shadow-lg transition-all ${
                                state.currentStep === 3 ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-orange-500 text-white hover:bg-orange-600'
                            }`}
                        >
                            {state.currentStep === 3 ? 'Workshop Complete' : 'Continue'}
                        </button>
                    </div>
                    <footer className="mt-12 py-8 border-t border-gray-100 text-center text-xs text-gray-400">Market Entry Readiness Workshop — GTM Program — 2026</footer>
</div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WorkshopApp />);
    </script>
</body>
</html>
